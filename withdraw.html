<!DOCTYPE html>
<html>
<head>
    <title>Withdraw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h1>Withdraw Money</h1>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<input
type="text"
id="upi"
placeholder="Enter UPI ID">

<button onclick="withdrawMoney()">
Withdraw
</button>

<br><br>

<button onclick="goBack()">
Back
</button>

</div>

<script>

const username =
localStorage.getItem("username");

async function withdrawMoney(){

    const amount =
    document.getElementById(
        "amount"
    ).value;

    const upi =
    document.getElementById(
        "upi"
    ).value;

    const response =
    await fetch("/withdraw",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            username,
            amount:Number(amount),
            upi
        })
    });

    const data =
    await response.text();

    alert(data);
}

function goBack(){

    window.location.href =
    "dashboard.html";
}

</script>

</body>
</html>
