<!DOCTYPE html>
<html>
<head>
<title>EarnifyX Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>EarnifyX</h1>

<h2>Register</h2>

<input
type="text"
id="username"
placeholder="Username">

<br><br>

<input
type="password"
id="password"
placeholder="Password">

<br><br>

<input
type="text"
id="referral"
placeholder="Referral Code (Optional)">

<br><br>

<button onclick="signup()">
Register
</button>

<br><br>

<a href="login.html">
Already have account?
</a>

</div>

<script>

async function signup(){

const username =
document.getElementById(
"username"
).value;

const password =
document.getElementById(
"password"
).value;

const referral =
document.getElementById(
"referral"
).value;

try{

const response =
await fetch(
"https://earnifyx.onrender.com/signup",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
username,
password,
referral
})

});

const data =
await response.text();

alert(data);

if(
data.includes(
"successful"
)
){

window.location.href =
"login.html";
}

}catch(error){

alert(
"Error connecting backend"
);

console.log(error);
}

}

</script>

</body>
</html>
