<!DOCTYPE html>
<html>
<head>

<title>Earnify Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
text-align:center;
padding-top:80px;
color:white;
}

.box{
background:#1e293b;
width:300px;
margin:auto;
padding:30px;
border-radius:15px;
}

h1{
color:#22c55e;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:95%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white;
margin-top:10px;
}

a{
color:#22c55e;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h1>Login 🚀</h1>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Login</button>

<p>
No account?
<a href="signup.html">Create Account</a>
</p>

</div>

</body>
</html>
