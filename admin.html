<!DOCTYPE html>
<html>
<head>

<title>Earnify Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
}

.logo{
font-size:35px;
font-weight:bold;
color:#22c55e;
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.user{
background:#0f172a;
padding:12px;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white;
}

</style>

</head>

<body>

<div class="logo">
Earnify Admin 👑
</div>

<div class="card">

<h2>Total Users</h2>

<h1 id="totalUsers">0</h1>

</div>

<div class="card">

<h2>User Database</h2>

<div id="users"></div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA-NBfTcaVj46RL-1kUeBsIqFszj2-deyA",

authDomain: "earnify-8200f.firebaseapp.com",

projectId: "earnify-8200f",

storageBucket: "earnify-8200f.firebasestorage.app",

messagingSenderId: "394402338930",

appId: "1:394402338930:web:840ab87361ea50b5424aeb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function loadUsers(){

const querySnapshot =
await getDocs(collection(db,"users"));

document.getElementById("totalUsers")
.innerHTML = querySnapshot.size;

querySnapshot.forEach((doc)=>{

let data = doc.data();

document.getElementById("users")
.innerHTML += `

<div class="user">

<h3>${doc.id}</h3>

<p>Balance: ₹${data.balance}</p>

</div>

`;

});

}

loadUsers();

</script>

</body>
</html>
