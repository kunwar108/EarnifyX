<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h1>Admin Panel</h1>

<h2>Users</h2>

<div id="users"></div>

<h2>Withdraw Requests</h2>

<div id="withdraws"></div>

</div>

<script>

async function loadUsers(){

    const response =
    await fetch("/admin/users");

    const users =
    await response.json();

    let html = "";

    users.forEach(user=>{

        html += `
        <p>
        ${user.username}
        - ₹${user.balance}
        </p>
        `;
    });

    document.getElementById(
        "users"
    ).innerHTML = html;
}

async function loadWithdraws(){

    const response =
    await fetch("/admin/withdraws");

    const withdraws =
    await response.json();

    let html = "";

    withdraws.forEach(w=>{

        html += `
        <p>
        ${w.username}
        - ₹${w.amount}
        - ${w.upi}
        - ${w.status}
        </p>
        `;
    });

    document.getElementById(
        "withdraws"
    ).innerHTML = html;
}

loadUsers();
loadWithdraws();

</script>

</body>
</html>
