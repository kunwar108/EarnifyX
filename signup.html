<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
padding:20px;
color:white;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-top:50px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h1>Create Account 🚀</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
Signup
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyA-NBfTcaVj46RL-1kUeBsIqFszj2-deyA",

authDomain: "earnify-8200f.firebaseapp.com",

projectId: "earnify-8200f",

storageBucket: "earnify-8200f.firebasestorage.app",

messagingSenderId: "394402338930",

appId: "1:394402338930:web:840ab87361ea50b5424aeb"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.signup = function(){

let email = document.getElementById("email").value;

let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)

.then(() => {

alert("Signup Success 🚀");

window.location.href="dashboard.html";

})

.catch((error) => {

alert(error.message);

});

}

</script>

</body>
</html>
