<!DOCTYPE html>
<html>
<head>

<title>Earnify Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
margin:0;
}

.logo{
font-size:35px;
font-weight:bold;
color:#22c55e;
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.balance{
font-size:40px;
color:#22c55e;
font-weight:bold;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:12px;
font-size:18px;
color:white;
margin-top:10px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="logo">
Earnify 🚀
</div>

<div class="card">

<h2 id="user"></h2>

<p>Your Balance</p>

<div class="balance">
₹ <span id="money">0</span>
</div>

<button onclick="dailyReward()">
Claim Daily Reward
</button>

</div>

<div class="card">

<h2>Referral Code</h2>

<input type="text" id="refcode" readonly>

<button onclick="copyCode()">
Copy Referral Code
</button>

</div>

<div class="card">

<h2>Withdraw</h2>

<input type="text" id="upi"
placeholder="Enter UPI ID">

<button onclick="withdrawMoney()">
Request Withdraw
</button>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
getDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA-NBfTcaVj46RL-1kUeBsIqFszj2-deyA",

authDomain: "earnify-8200f.firebaseapp.com",

projectId: "earnify-8200f",

storageBucket: "earnify-8200f.firebasestorage.app",

messagingSenderId: "394402338930",

appId: "1:394402338930:web:840ab87361ea50b5424aeb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let email =
localStorage.getItem("userEmail");

document.getElementById("user").innerHTML =
"Welcome: " + email;

let userId =
email.replace(/[^a-zA-Z0-9]/g,'');

let balance = 0;

const ref = doc(db,"users",userId);

async function loadData(){

const snap = await getDoc(ref);

if(snap.exists()){

balance = snap.data().balance;

document.getElementById("money").innerHTML =
balance;

}
else{

await setDoc(ref,{
balance:0
});

}

}

loadData();

window.dailyReward = async function(){

balance += 10;

document.getElementById("money").innerHTML =
balance;

await setDoc(ref,{
balance:balance
});

alert("Reward Added 🔥");

}

let randomCode =
"ERN" + Math.floor(Math.random()*100000);

document.getElementById("refcode").value =
randomCode;

window.copyCode = function(){

let copyText =
document.getElementById("refcode");

copyText.select();

document.execCommand("copy");

alert("Referral Code Copied");

}

window.withdrawMoney = function(){

let upi =
document.getElementById("upi").value;

if(upi==""){

alert("Enter UPI ID");

}
else{

alert("Withdraw Request Submitted");

}

}

</script>

</body>
</html>
