<!DOCTYPE html>
<html>
<head>

<title>Earnify Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
}

.logo{
font-size:35px;
font-weight:bold;
color:#22c55e;
text-align:center;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white;
margin-top:10px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="logo">
Earnify 🚀
</div>

<div class="card">
<h2>Your Balance</h2>
<h1 id="balance">₹50</h1>
</div>

<div class="card">

<h2>Your Referral Code</h2>

<input type="text" value="ERN12345" id="refcode" readonly>

<button onclick="copyCode()">
Copy Referral Code
</button>

</div>

<div class="card">

<h2>Daily Tasks</h2>

<p>✅ Watch Ads = ₹5</p>
<p>✅ Invite Friends = ₹20</p>
<p>✅ Daily Login = ₹2</p>

<button onclick="earnMoney()">
Claim Daily Reward
</button>

</div>

<div class="card">

<h2>Withdraw</h2>

<button>
Request Withdraw
</button>

</div>

<script>

function copyCode(){

let copyText = document.getElementById("refcode");

copyText.select();

document.execCommand("copy");

alert("Referral Code Copied 🚀");

}

function earnMoney(){

let balance = document.getElementById("balance");

balance.innerHTML = "₹77";

alert("Reward Added 🔥");

}

</script>

</body>
</html>
