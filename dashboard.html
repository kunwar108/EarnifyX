```html
<!DOCTYPE html>
<html>
<head>

<title>Earnify Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
margin:0;
}

.logo{
font-size:38px;
font-weight:bold;
color:#22c55e;
text-align:center;
margin-top:10px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.balance{
font-size:40px;
color:#22c55e;
font-weight:bold;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:12px;
font-size:18px;
color:white;
margin-top:12px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

.task{
background:#0f172a;
padding:12px;
border-radius:10px;
margin-top:10px;
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<div class="logo">
Earnify 🚀
</div>

<div class="card">

<h2 id="user">
Welcome User
</h2>

<p>Your Balance</p>

<div class="balance">
₹ <span id="money">50</span>
</div>

</div>

<div class="card">

<h2>🎁 Daily Reward</h2>

<p>Claim your reward every day</p>

<button onclick="dailyReward()">
Claim ₹10 Reward
</button>

</div>

<div class="card">

<h2>👥 Referral System</h2>

<p>Your Referral Code</p>

<input type="text" id="refcode" readonly>

<button onclick="copyCode()">
Copy Referral Code
</button>

</div>

<div class="card">

<h2>📋 Tasks</h2>

<div class="task">
✅ Watch Ads = ₹5
</div>

<div class="task">
✅ Invite Friends = ₹20
</div>

<div class="task">
✅ Daily Login = ₹2
</div>

<button onclick="taskReward()">
Complete Task
</button>

</div>

<div class="card">

<h2>💸 Withdraw Money</h2>

<input type="text" id="upi"
placeholder="Enter UPI ID">

<button onclick="withdrawMoney()">
Request Withdraw
</button>

</div>

<script>

let balance = 50;

let email =
localStorage.getItem("userEmail");

if(email){

document.getElementById("user").innerHTML =
"Welcome: " + email;

}

function dailyReward(){

balance = balance + 10;

document.getElementById("money").innerHTML =
balance;

alert("₹10 Reward Added 🔥");

}

function taskReward(){

balance = balance + 5;

document.getElementById("money").innerHTML =
balance;

alert("Task Reward Added ✅");

}

let randomCode =
"ERN" + Math.floor(Math.random()*100000);

document.getElementById("refcode").value =
randomCode;

function copyCode(){

let copyText =
document.getElementById("refcode");

copyText.select();

document.execCommand("copy");

alert("Referral Code Copied 🚀");

}

function withdrawMoney(){

let upi =
document.getElementById("upi").value;

if(upi==""){

alert("Please Enter UPI ID");

}
else{

alert("Withdraw Request Submitted ✅");

}

}

</script>

</body>
</html>
```
