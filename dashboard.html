<body>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyA-NBfTcaVj46RL-1kUeBsIqFszj2-deyA",

authDomain: "earnify-8200f.firebaseapp.com",

projectId: "earnify-8200f",

storageBucket: "earnify-8200f.firebasestorage.app",

messagingSenderId: "394402338930",

appId: "1:394402338930:web:840ab87361ea50b5424aeb"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let email =
localStorage.getItem("userEmail");

if(email){

document.getElementById("user").innerHTML =
"Welcome: " + email;

}

let userId =
(email || "guest")
.replace(/[^a-zA-Z0-9]/g,'');

let balance = 0;

const ref = doc(db,"users",userId);

async function loadData(){

const snap = await getDoc(ref);

if(snap.exists()){

balance = snap.data().balance || 0;

document.getElementById("money").innerHTML =
balance;

}
else{

await setDoc(ref,{
balance:0
});

}

}

loadData();

window.dailyReward = async function(){

balance += 10;

document.getElementById("money").innerHTML =
balance;

await setDoc(ref,{
balance:balance
});

alert("₹10 Reward Added 🔥");

}

window.taskReward = async function(){

balance += 5;

document.getElementById("money").innerHTML =
balance;

await setDoc(ref,{
balance:balance
});

alert("Task Reward Added ✅");

}

let randomCode =
"ERN" + Math.floor(Math.random()*100000);

document.getElementById("refcode").value =
randomCode;

window.copyCode = function(){

let copyText =
document.getElementById("refcode");

copyText.select();

document.execCommand("copy");

alert("Referral Code Copied 🚀");

}

window.withdrawMoney = async function(){

let upi =
document.getElementById("upi").value;

let amount =
document.getElementById("amount").value;

if(upi=="" || amount==""){

alert("Fill All Fields");

}
else{

await addDoc(collection(db,"withdraws"),{

email:email,
upi:upi,
amount:amount,
time:new Date().toLocaleString()

});

alert("Withdraw Request Submitted ✅");

}

}

</script>
