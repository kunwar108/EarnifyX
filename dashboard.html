<!DOCTYPE html>
<html>
<head>
<title>Earnify Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#000;
font-family:Arial;
color:white;
padding:20px;
}

.box{
background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#00ff99;
}

h1{
color:#00ff99;
}

.balance{
font-size:35px;
color:#00ff99;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
}

</style>
</head>

<body>

<h1>Earnify Dashboard 🚀</h1>

<div class="box">

<h2 id="user"></h2>

<h2 class="balance">
₹ <span id="money">50</span>
</h2>

</div>

<div class="box">

<h2>Referral Code</h2>

<input type="text" id="refcode" readonly>

<button onclick="copyCode()">
Copy Referral Code
</button>

</div>

<div class="box">

<h2>Daily Reward</h2>

<button onclick="dailyReward()">
Claim ₹10 Reward
</button>

</div>

<div class="box">

<h2>Tasks</h2>

<button>Watch Ads</button>

<button>Complete Offers</button>

<button>Refer Friends</button>

</div>

<div class="box">

<h2>Withdraw</h2>

<button>
Withdraw Money
</button>

</div>

<script>

let email = localStorage.getItem("userEmail");

document.getElementById("user").innerHTML =
"Welcome: " + email;

let balance = 50;

function dailyReward(){

balance = balance + 10;

document.getElementById("money").innerHTML = balance;

alert("₹10 Added Successfully 🔥");

}

let randomCode =
"ERN" + Math.floor(Math.random()*100000);

document.getElementById("refcode").value =
randomCode;

function copyCode(){

let copyText =
document.getElementById("refcode");

copyText.select();

document.execCommand("copy");

alert("Referral Code Copied 🚀");

}

</script>

</body>
</html>
