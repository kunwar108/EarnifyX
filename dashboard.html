<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#000;
font-family:Arial;
color:white;
padding:20px;
}

.box{
background:#111;
padding:20px;
border-radius:15px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#00ff99;
}

h1{
color:#00ff99;
}

</style>
</head>

<body>

<h1>Earnify Dashboard 🚀</h1>

<div class="box">
<h2 id="user"></h2>
<h2>Balance: ₹50</h2>
</div>

<div class="box">
<h2>Daily Tasks</h2>

<button>Watch Ads</button>

<button>Complete Offer</button>

<button>Refer & Earn</button>
</div>

<div class="box">
<h2>Withdraw</h2>

<button>Withdraw Money</button>
</div>

<script>

let email = localStorage.getItem("userEmail");

document.getElementById("user").innerHTML =
"Welcome: " + email;

</script>

</body>
</html>
